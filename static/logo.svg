<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Clock face -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#3B82F6" stroke-width="2.5"/>

  <!-- Cardinal hour markers (12, 3, 6, 9) -->
  <line x1="50" y1="9" x2="50" y2="17" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
  <line x1="91" y1="50" x2="83" y2="50" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="91" x2="50" y2="83" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
  <line x1="9" y1="50" x2="17" y2="50" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>

  <!-- Minor hour markers -->
  <line x1="72" y1="13.4" x2="69.2" y2="18.2" stroke="#3B82F6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="86.6" y1="28" x2="81.8" y2="30.8" stroke="#3B82F6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="86.6" y1="72" x2="81.8" y2="69.2" stroke="#3B82F6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="72" y1="86.6" x2="69.2" y2="81.8" stroke="#3B82F6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="28" y1="86.6" x2="30.8" y2="81.8" stroke="#3B82F6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="13.4" y1="72" x2="18.2" y2="69.2" stroke="#3B82F6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="13.4" y1="28" x2="18.2" y2="30.8" stroke="#3B82F6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="28" y1="13.4" x2="30.8" y2="18.2" stroke="#3B82F6" stroke-width="1.2" stroke-linecap="round"/>

  <!-- V-shaped clock hands (11:05 position) -->
  <!-- Hour hand toward 11 (330° from 12) -->
  <line x1="50" y1="50" x2="35" y2="24" stroke="#1E3A5F" stroke-width="4" stroke-linecap="round"/>
  <!-- Minute hand toward 1 (30° from 12) -->
  <line x1="50" y1="50" x2="65" y2="24" stroke="#1E3A5F" stroke-width="3" stroke-linecap="round"/>

  <!-- Center pivot -->
  <circle cx="50" cy="50" r="3.5" fill="#3B82F6"/>
</svg>
